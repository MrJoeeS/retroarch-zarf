apiVersion: v1
kind: Service
metadata:
  name: {{ include "retroarch.fullname" . }}
  labels:
    {{- include "retroarch.labels" . | nindent 4 }}
    zarf.dev/connect-name: retroarch
  annotations:
    zarf.dev/connect-description: "Play classic games in RetroArch through your browser"
spec:
  selector:
    {{- include "retroarch.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: https
      port: {{ .Values.service.httpsPort }}
      targetPort: https
      protocol: TCP
